default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://ai_pm:ai_pm_password@localhost:55432/ai_pm_development") %>

test:
  <<: *default
  url: <%= ENV.fetch("TEST_DATABASE_URL", "postgres://ai_pm:ai_pm_password@localhost:55432/ai_pm_test") %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
