services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ai_pm
      POSTGRES_PASSWORD: ai_pm_password
      POSTGRES_DB: ai_pm_development
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_pm -d ai_pm_development"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
