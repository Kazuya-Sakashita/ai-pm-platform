    FailedJobRetryRefailureMetrics:
      type: object
      required: [measured, window_hours, retry_count, numerator, denominator, threshold, exclusions]
      properties:
        measured:
          type: boolean
          description: この計測窓でAuditLogとjob_queue_mappingsから計測できた場合はtrue。
        window_hours:
          type: integer
          minimum: 1
        retry_count:
          type: integer
          minimum: 0
        rate:
          oneOf:
            - type: number
              minimum: 0
              maximum: 1
            - type: "null"
