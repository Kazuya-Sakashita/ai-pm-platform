        numerator:
          type: integer
          minimum: 0
        denominator:
          type: integer
          minimum: 0
        threshold:
          type: number
          minimum: 0
          maximum: 1
        exclusions:
          type: object
          required: [missing_product_job_id, missing_solid_queue_job_id, mapping_mismatch, solid_queue_unavailable]
