components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token. The API derives actor identity from the verified `sub` claim. Production-grade tokens must also carry `kid`, `sid`, `sv`, and `jti` for key rotation, session validation, and revocation. `X-Actor-Id` is not part of the production API contract.

  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectIdQuery:
      name: project_id
      in: query
      required: true
      schema:
        type: string
        format: uuid
    ProjectIdQueryOptional:
      name: project_id
      in: query
      required: false
      description: Required when no review target_type/target_id filter is provided.
      schema:
        type: string
        format: uuid
    AuthSessionId:
      name: auth_session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MembershipId:
      name: membership_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MeetingId:
      name: meeting_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ConversationImportId:
      name: conversation_import_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ConversationSummaryDraftId:
      name: conversation_summary_draft_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MinutesId:
      name: minutes_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RequirementId:
      name: requirement_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IssueDraftId:
      name: issue_draft_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OpenApiDraftId:
