  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication, token revocation, session validation, or signature verification failed. Error codes must be safe to show and must never include raw tokens, secrets, or private claims.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalid_token:
              summary: Invalid token
              value:
                error:
                  code: invalid_token
                  message: Authentication token is invalid.
                  details:
                    action: project_read
                request_id: req_example
            token_revoked:
              summary: Revoked token
              value:
                error:
                  code: token_revoked
                  message: Authentication token has been revoked.
                  details:
                    action: project_read
                request_id: req_example
            session_revoked:
              summary: Revoked session
              value:
                error:
                  code: session_revoked
                  message: Authentication session has been revoked.
                  details:
                    action: project_read
                request_id: req_example
            signing_key_retired:
              summary: Retired signing key
              value:
                error:
                  code: signing_key_retired
                  message: Authentication token key has been retired.
                  details:
                    action: project_read
                request_id: req_example
    Forbidden:
      description: Actor is not allowed to perform this action in the project
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with current project state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ReviewRequired:
      description: Review or approval is required before this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    IntegrationNotConnected:
      description: Required integration is not connected
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UpstreamError:
      description: Upstream AI provider failed or returned an invalid response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

