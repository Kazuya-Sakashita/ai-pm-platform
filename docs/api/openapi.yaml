openapi: 3.1.0
info:
  title: AI PM Platform API
  version: 0.1.0
  description: MVP API for converting meeting logs into minutes, requirements, issue drafts, OpenAPI drafts, reviews, and GitHub sync.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: https://api.ai-pm-platform.test/api/v1
    description: Production environment placeholder. Replace with the owned production domain before public release.
  - url: https://dev.api.ai-pm-platform.test/api/v1
    description: Development environment placeholder. Local clients override this with NEXT_PUBLIC_API_BASE_URL.
security:
  - bearerAuth: []
tags:
  - name: Health
    description: Service health and availability checks.
  - name: Projects
    description: Project workspaces that group meetings, artifacts, integrations, and audit logs.
  - name: ProjectMemberships
    description: Project membership, role, and revocation management.
  - name: AuthSessions
    description: Auth session lifecycle, self-service device revoke, and re-authentication recovery.
  - name: Meetings
    description: Meeting logs and source material used to generate downstream artifacts.
  - name: ConversationImports
    description: Manually imported private conversations such as Discord DM paste, with consent, redaction, and AI review gates.
  - name: Minutes
    description: AI-generated and human-reviewed meeting minutes.
  - name: Requirements
    description: Requirement drafts generated from approved minutes.
  - name: IssueDrafts
    description: GitHub Issue drafts generated from approved requirements.
  - name: OpenApiDrafts
    description: OpenAPI draft artifacts generated from approved requirements.
  - name: Reviews
    description: Expert review records, blockers, accepted risks, and improvement actions.
  - name: Integrations
    description: External service connection lifecycle and project integration accounts.
  - name: Jobs
    description: Asynchronous generation, validation, and publish jobs.
  - name: Operations
    description: Read-only operational health and queue monitoring endpoints.
  - name: Webhooks
    description: 外部連携サービスから受信するwebhook endpoint。
  - name: AuditLogs
    description: Immutable project activity and security audit records.
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/sessions:
    get:
      tags: [AuthSessions]
      summary: List current actor auth sessions
      operationId: listAuthSessions
      responses:
        "200":
          description: Auth sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/sessions/current:
    delete:
      tags: [AuthSessions]
      summary: Revoke the current auth session
      operationId: revokeCurrentAuthSession
      responses:
        "200":
          description: Current auth session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/sessions/{auth_session_id}:
    delete:
      tags: [AuthSessions]
      summary: Revoke one of the current actor auth sessions
      operationId: revokeAuthSession
      parameters:
        - $ref: "#/components/parameters/AuthSessionId"
      responses:
        "200":
          description: Auth session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/logout-everywhere:
    post:
      tags: [AuthSessions]
      summary: Revoke all current actor auth sessions
      operationId: logoutEverywhere
      responses:
        "200":
          description: All current actor auth sessions revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLogoutEverywhereResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /projects:
    get:
      tags: [Projects]
      summary: List projects
      operationId: listProjects
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Projects]
      summary: Create project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /projects/{project_id}:
