openapi: 3.1.0
info:
  title: AI PM Platform API
  version: 0.1.0
  description: MVP API for converting meeting logs into minutes, requirements, issue drafts, OpenAPI drafts, reviews, and GitHub sync.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: https://api.ai-pm-platform.test/api/v1
    description: Production environment placeholder. Replace with the owned production domain before public release.
  - url: https://dev.api.ai-pm-platform.test/api/v1
    description: Development environment placeholder. Local clients override this with NEXT_PUBLIC_API_BASE_URL.
security:
  - bearerAuth: []
tags:
  - name: Health
    description: Service health and availability checks.
  - name: Projects
    description: Project workspaces that group meetings, artifacts, integrations, and audit logs.
  - name: Meetings
    description: Meeting logs and source material used to generate downstream artifacts.
  - name: Minutes
    description: AI-generated and human-reviewed meeting minutes.
  - name: Requirements
    description: Requirement drafts generated from approved minutes.
  - name: IssueDrafts
    description: GitHub Issue drafts generated from approved requirements.
  - name: OpenApiDrafts
    description: OpenAPI draft artifacts generated from approved requirements.
  - name: Reviews
    description: Expert review records, blockers, accepted risks, and improvement actions.
  - name: Integrations
    description: External service connection lifecycle and project integration accounts.
  - name: Jobs
    description: Asynchronous generation, validation, and publish jobs.
  - name: Webhooks
    description: Incoming webhook endpoints for connected external systems.
  - name: AuditLogs
    description: Immutable project activity and security audit records.
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /projects:
    get:
      tags: [Projects]
      summary: List projects
      operationId: listProjects
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Projects]
      summary: Create project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /projects/{project_id}:
    get:
      tags: [Projects]
      summary: Get project
      operationId: getProject
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Projects]
      summary: Update project
      operationId: updateProject
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Projects]
      summary: Archive project
      operationId: archiveProject
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "204":
          description: Project archived
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{project_id}/meetings:
    get:
      tags: [Meetings]
      summary: List meetings in project
      operationId: listProjectMeetings
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Meetings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingListResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Meetings]
      summary: Create meeting
      operationId: createMeeting
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMeetingRequest"
      responses:
        "201":
          description: Meeting created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /meetings/{meeting_id}:
    get:
      tags: [Meetings]
      summary: Get meeting
      operationId: getMeeting
      parameters:
        - $ref: "#/components/parameters/MeetingId"
      responses:
        "200":
          description: Meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /meetings/{meeting_id}/generate-minutes:
    post:
      tags: [Minutes]
      summary: Generate minutes from a meeting
      operationId: generateMinutes
      parameters:
        - $ref: "#/components/parameters/MeetingId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Minutes generation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationJobResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "424":
          $ref: "#/components/responses/IntegrationNotConnected"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /minutes/{minutes_id}:
    get:
      tags: [Minutes]
      summary: Get minutes
      operationId: getMinutes
      parameters:
        - $ref: "#/components/parameters/MinutesId"
      responses:
        "200":
          description: Minutes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinutesResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Minutes]
      summary: Update minutes
      operationId: updateMinutes
      parameters:
        - $ref: "#/components/parameters/MinutesId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMinutesRequest"
      responses:
        "200":
          description: Minutes updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinutesResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /minutes/{minutes_id}/approve:
    post:
      tags: [Minutes]
      summary: Approve minutes
      operationId: approveMinutes
      parameters:
        - $ref: "#/components/parameters/MinutesId"
      responses:
        "200":
          description: Minutes approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinutesResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/ReviewRequired"

  /minutes/{minutes_id}/generate-requirement:
    post:
      tags: [Requirements]
      summary: Generate requirement from minutes
      operationId: generateRequirement
      parameters:
        - $ref: "#/components/parameters/MinutesId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Requirement generation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationJobResponse"
        "409":
          $ref: "#/components/responses/ReviewRequired"

  /requirements/{requirement_id}:
    get:
      tags: [Requirements]
      summary: Get requirement
      operationId: getRequirement
      parameters:
        - $ref: "#/components/parameters/RequirementId"
      responses:
        "200":
          description: Requirement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Requirements]
      summary: Update requirement
      operationId: updateRequirement
      parameters:
        - $ref: "#/components/parameters/RequirementId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRequirementRequest"
      responses:
        "200":
          description: Requirement updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /requirements/{requirement_id}/approve:
    post:
      tags: [Requirements]
      summary: Approve requirement
      operationId: approveRequirement
      parameters:
        - $ref: "#/components/parameters/RequirementId"
      responses:
        "200":
          description: Requirement approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/ReviewRequired"

  /requirements/{requirement_id}/generate-issue-draft:
    post:
      tags: [IssueDrafts]
      summary: Generate GitHub issue draft from requirement
      operationId: generateIssueDraft
      parameters:
        - $ref: "#/components/parameters/RequirementId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Issue draft generation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationJobResponse"
        "409":
          $ref: "#/components/responses/ReviewRequired"

  /requirements/{requirement_id}/generate-openapi-draft:
    post:
      tags: [OpenApiDrafts]
      summary: Generate OpenAPI draft from requirement
      operationId: generateOpenApiDraft
      parameters:
        - $ref: "#/components/parameters/RequirementId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: OpenAPI draft generation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationJobResponse"
        "409":
          $ref: "#/components/responses/ReviewRequired"

  /issue-drafts/{issue_draft_id}:
    get:
      tags: [IssueDrafts]
      summary: Get issue draft
      operationId: getIssueDraft
      parameters:
        - $ref: "#/components/parameters/IssueDraftId"
      responses:
        "200":
          description: Issue draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueDraftResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [IssueDrafts]
      summary: Update issue draft
      operationId: updateIssueDraft
      parameters:
        - $ref: "#/components/parameters/IssueDraftId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIssueDraftRequest"
      responses:
        "200":
          description: Issue draft updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueDraftResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /issue-drafts/{issue_draft_id}/publish-github:
    post:
      tags: [IssueDrafts]
      summary: Publish approved issue draft to GitHub
      operationId: publishIssueDraftToGitHub
      parameters:
        - $ref: "#/components/parameters/IssueDraftId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Publish accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishGitHubIssueResponse"
        "409":
          $ref: "#/components/responses/ReviewRequired"
        "424":
          $ref: "#/components/responses/IntegrationNotConnected"

  /issue-drafts/{issue_draft_id}/reconcile-github-publish:
    post:
      tags: [IssueDrafts]
      summary: Reconcile a GitHub Issue publish attempt by marker search
      operationId: reconcileGitHubIssuePublish
      parameters:
        - $ref: "#/components/parameters/IssueDraftId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Reconciliation completed or requires human review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconcileGitHubIssueResponse"
        "409":
          $ref: "#/components/responses/ReviewRequired"
        "424":
          $ref: "#/components/responses/IntegrationNotConnected"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /issue-drafts/{issue_draft_id}/resolve-github-reconciliation:
    post:
      tags: [IssueDrafts]
      summary: Resolve a GitHub publish reconciliation blocker manually
      operationId: resolveGitHubIssueReconciliation
      parameters:
        - $ref: "#/components/parameters/IssueDraftId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveGitHubReconciliationRequest"
      responses:
        "202":
          description: Manual reconciliation resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveGitHubReconciliationResponse"
        "409":
          $ref: "#/components/responses/ReviewRequired"
        "422":
          $ref: "#/components/responses/ValidationError"

  /openapi-drafts/{openapi_draft_id}:
    get:
      tags: [OpenApiDrafts]
      summary: Get OpenAPI draft
      operationId: getOpenApiDraft
      parameters:
        - $ref: "#/components/parameters/OpenApiDraftId"
      responses:
        "200":
          description: OpenAPI draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenApiDraftResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [OpenApiDrafts]
      summary: Update OpenAPI draft
      operationId: updateOpenApiDraft
      parameters:
        - $ref: "#/components/parameters/OpenApiDraftId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOpenApiDraftRequest"
      responses:
        "200":
          description: OpenAPI draft updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenApiDraftResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /openapi-drafts/{openapi_draft_id}/validate:
    post:
      tags: [OpenApiDrafts]
      summary: Validate OpenAPI draft
      operationId: validateOpenApiDraft
      parameters:
        - $ref: "#/components/parameters/OpenApiDraftId"
      responses:
        "200":
          description: OpenAPI validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenApiValidationResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /reviews:
    get:
      tags: [Reviews]
      summary: List reviews
      operationId: listReviews
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: target_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReviewTargetType"
        - name: target_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Reviews]
      summary: Create review
      operationId: createReview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /reviews/{review_id}/resolve-action:
    post:
      tags: [Reviews]
      summary: Mark review action resolved
      operationId: resolveReviewAction
      parameters:
        - $ref: "#/components/parameters/ReviewId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveReviewActionRequest"
      responses:
        "200":
          description: Review updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /reviews/{review_id}/accept-risk:
    post:
      tags: [Reviews]
      summary: Mark review blocker as accepted risk
      operationId: acceptReviewRisk
      parameters:
        - $ref: "#/components/parameters/ReviewId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptReviewRiskRequest"
      responses:
        "200":
          description: Review marked as accepted risk
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /projects/{project_id}/integrations:
    get:
      tags: [Integrations]
      summary: List project integrations
      operationId: listProjectIntegrations
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Integrations
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/IntegrationAccount"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{project_id}/integrations/github/connect:
    post:
      tags: [Integrations]
      summary: Start GitHub connection
      operationId: startGitHubConnection
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartGitHubConnectionRequest"
      responses:
        "200":
          description: GitHub connection URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartGitHubConnectionResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /projects/{project_id}/integrations/github/disconnect:
    post:
      tags: [Integrations]
      summary: Disconnect GitHub integration
      operationId: disconnectGitHubIntegration
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: GitHub integration disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationAccountResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /integrations/github/callback:
    post:
      tags: [Integrations]
      summary: Complete GitHub connection callback
      operationId: completeGitHubConnectionCallback
      security: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubCallbackRequest"
      responses:
        "200":
          description: GitHub integration connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationAccountResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "424":
          $ref: "#/components/responses/IntegrationNotConnected"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /webhooks/github:
    post:
      tags: [Webhooks]
      summary: Receive GitHub App webhook
      operationId: receiveGitHubWebhook
      security: []
      parameters:
        - $ref: "#/components/parameters/GitHubEvent"
        - $ref: "#/components/parameters/GitHubDelivery"
        - $ref: "#/components/parameters/GitHubSignature256"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /jobs/{job_id}:
    get:
      tags: [Jobs]
      summary: Get generation or integration job
      operationId: getJob
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{project_id}/audit-logs:
    get:
      tags: [AuditLogs]
      summary: List audit logs
      operationId: listProjectAuditLogs
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MeetingId:
      name: meeting_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MinutesId:
      name: minutes_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RequirementId:
      name: requirement_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IssueDraftId:
      name: issue_draft_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OpenApiDraftId:
      name: openapi_draft_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReviewId:
      name: review_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
    GitHubEvent:
      name: X-GitHub-Event
      in: header
      required: true
      schema:
        type: string
    GitHubDelivery:
      name: X-GitHub-Delivery
      in: header
      required: true
      schema:
        type: string
    GitHubSignature256:
      name: X-Hub-Signature-256
      in: header
      required: true
      schema:
        type: string

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication or signature verification failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ReviewRequired:
      description: Review or approval is required before this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    IntegrationNotConnected:
      description: Required integration is not connected
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UpstreamError:
      description: Upstream AI provider failed or returned an invalid response
      content:
